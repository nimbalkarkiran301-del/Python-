<!DOCTYPE html>
<html>

<head>

    <title>All Students</title>

    <link rel="stylesheet"   href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>Student Management System</h1>

    <a href="/" class="add-btn"> Add New Student
    </a>

    <br><br>

    <table>

        <tr>

            <th>ID</th>

            <th>Name</th>

            <th>Email</th>

            <th>Course</th>

            <th>Edit</th>

            <th>Delete</th>

        </tr>

        {% for student in students %}

        <tr>

            <td>{{ student[0] }}</td>

            <td>{{ student[1] }}</td>

            <td>{{ student[2] }}</td>

            <td>{{ student[3] }}</td>

            <td>

                <a href="/edit/{{ student[0] }}" class="edit-btn">

                    Edit

                </a>

            </td>

            <td>

                <a href="/delete/{{ student[0] }}" class="delete-btn"
                   onclick="return confirm('Are you sure?')">

                    Delete

                </a>

            </td>

        </tr>

        {% endfor %}

    </table>

</div>

</body>

</html>
